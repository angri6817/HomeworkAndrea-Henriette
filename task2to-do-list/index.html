<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="header">
        <h2>My To-Do List</h2>
        <h3>Add your tasks to your to-do list under.</h3>
        
        <div class="inputArea">
            <input type="text" id="myInput" placeholder="Write your task here...">
            <input type="date" id="dueDateInput">
            <button onclick="newElement()">Add</button>
        </div>
    </div>
    
    <ul id="myUL"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
